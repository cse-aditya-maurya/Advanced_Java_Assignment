server:
  port: 8080

spring:
  application:
    name: api-gateway1

  cloud:
    gateway:
      routes:
        - id: movie-service-route
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/movies/**

        - id: booking-service-route
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/bookings/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka